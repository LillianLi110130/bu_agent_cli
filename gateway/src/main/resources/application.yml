spring:
  application:
    name: tgai
  datasource:
    url: ${GATEWAY_DB_URL:jdbc:mysql://localhost:3306/bu_gateway?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${GATEWAY_DB_USERNAME:root}
    password: ${GATEWAY_DB_PASSWORD:}
    driver-class-name: ${GATEWAY_DB_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

mybatis:
  mapper-locations:
    - classpath:mybatis/**/*.xml

  type-aliases-package: com.buagent.gateway.store.entity,com.cmb.tg.tgai.infrastructure.wecom.po

  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080

gateway:
  poll-wait-timeout-ms: ${GATEWAY_POLL_WAIT_TIMEOUT_MS:25000}
  delivery-lease-timeout-seconds: ${GATEWAY_DELIVERY_LEASE_TIMEOUT_SECONDS:120}
  owner-active-timeout-seconds: ${GATEWAY_OWNER_ACTIVE_TIMEOUT_SECONDS:90}
  mvc-async:
    core-pool-size: 10
    max-pool-size: 50
    queue-capacity: 200
    keep-alive-seconds: 60
    thread-name-prefix: gateway-async-

wecom-sync:
  app-id: your-app-id
  private-key: 6688096E7BBB15C1538026A34172B162536F3C69EC9065D1AC2D631E17E98AA7
  secret: 0371df70-3437-4cc9-ad87-15691b421d03
  verify: SM3withSM2
  group-base-info-url: http://127.0.0.1:8080/mock/wecom/group/group-base-info
  customer-base-info-url: http://127.0.0.1:8080/mock/wecom/customer/cust-base-info
  employee-info-url: http://127.0.0.1:8080/mock/wecom/employee/getUserInfoBySapId

chat:
  sync:
    group:
      cron: 0 0 2 * * ?
    customer:
      cron: 0 0 3 * * ?
    employee:
      cron: 0 20 3 * * ?

