spring:
  datasource:
    url: ${GATEWAY_DB_URL:jdbc:mysql://localhost:3306/bu_gateway?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${GATEWAY_DB_USERNAME:root}
    password: ${GATEWAY_DB_PASSWORD:}
    driver-class-name: ${GATEWAY_DB_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
  sql:
    init:
      mode: ${GATEWAY_SQL_INIT_MODE:always}
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.buagent.gateway.store.entity

gateway:
  poll-wait-timeout-ms: ${GATEWAY_POLL_WAIT_TIMEOUT_MS:25000}
  delivery-lease-timeout-seconds: ${GATEWAY_DELIVERY_LEASE_TIMEOUT_SECONDS:120}
  owner-active-timeout-seconds: ${GATEWAY_OWNER_ACTIVE_TIMEOUT_SECONDS:90}
